<!DOCTYPE html>
<head>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./TTTstyle.css">
    <script src="./TTTLogic.mjs" defer></script>
</head>
<body>
    <h1>Section: Games</h1>
    <a href="../index.html">(Back to main page)</a>
    <table id="GameTbl">
        <caption>Tic Tac Toe!</caption>
        <tr>
            <td data-x="0" data-y="0"> </td>
            <td data-x="0" data-y="1"> </td>
            <td data-x="0" data-y="2"> </td>
        </tr>
        <tr>
            <td data-x="1" data-y="0"> </td>
            <td data-x="1" data-y="1"> </td>
            <td data-x="1" data-y="2"> </td>
        </tr>
        <tr>
            <td data-x="2" data-y="0"> </td>
            <td data-x="2" data-y="1"> </td>
            <td data-x="2" data-y="2"> </td>
        </tr>
    </table>
    <h3 id="Result"> </h3>
    <div class="btn-cont">
        <button id="Reset">Reset the game</button>
    </div>
</body>
